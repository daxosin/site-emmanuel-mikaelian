<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- ME monogram with fused middle bar -->
  <!-- M: left vertical, diagonal down, diagonal up, transition to E -->
  <!-- E: continues from M's bar, with top and bottom bars -->

  <g fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- M left vertical -->
    <path d="M 6 24 L 6 8"/>
    <!-- M left diagonal -->
    <path d="M 6 8 L 11 16"/>
    <!-- M right diagonal -->
    <path d="M 11 16 L 16 8"/>
    <!-- M right vertical (partial, connects to fused bar) -->
    <path d="M 16 8 L 16 16"/>

    <!-- Fused horizontal bar (M's middle connects to E's middle) -->
    <path d="M 16 16 L 26 16"/>

    <!-- M right vertical continues below bar -->
    <path d="M 16 16 L 16 24"/>

    <!-- E vertical (shared with end of fused bar) -->
    <path d="M 26 8 L 26 24"/>

    <!-- E top bar -->
    <path d="M 26 8 L 19 8"/>

    <!-- E bottom bar -->
    <path d="M 26 24 L 19 24"/>
  </g>
</svg>
