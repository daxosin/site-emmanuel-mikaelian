<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Vertical line -->
      <line x1="50" y1="0" x2="50" y2="50" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
      <!-- Horizontal line -->
      <line x1="0" y1="50" x2="50" y2="50" stroke="#1e293b" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="100" height="100" fill="url(#grid)"/>
</svg>
